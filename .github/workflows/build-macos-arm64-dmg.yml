name: Build xSTUDIO macOS ARM64 DMG

on:
  workflow_dispatch:
    inputs:
      clean_dependencies:
        description: Rebuild dependencies without restoring the vcpkg cache
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

concurrency:
  group: xstudio-macos-arm64-dmg
  cancel-in-progress: false

jobs:
  build:
    name: xSTUDIO Release (Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 360

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 3
      VCPKG_DISABLE_METRICS: 1
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache

    steps:
      - name: Check out xSTUDIO
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          path: xstudio

      - name: Check out the pinned vcpkg baseline
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          repository: microsoft/vcpkg
          ref: c2aeddd80357b17592e59ad965d2adf65a19b22f
          fetch-depth: 0
          path: vcpkg

      - name: Select the tested Xcode toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          test "$(uname -m)" = "arm64"

      - name: Install build tools
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja pkg-config nasm autoconf autoconf-archive automake
          brew cleanup --prune=all
          cmake --version
          ninja --version
          df -h /

      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.5.3"
          host: mac
          target: desktop
          arch: clang_64
          modules: qtimageformats
          cache: true
          cache-key-prefix: xstudio-qt-6.5.3-macos

      - name: Restore vcpkg binary cache
        if: ${{ !inputs.clean_dependencies }}
        id: vcpkg-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .vcpkg-binary-cache
            vcpkg/downloads
          key: xstudio-vcpkg-macos-arm64-${{ hashFiles('xstudio/vcpkg.json', 'xstudio/cmake/vcpkg_overlay_ports/**', 'xstudio/cmake/vcpkg_triplets/**') }}

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure xSTUDIO for Apple Silicon
        working-directory: xstudio
        shell: bash
        run: |
          set -euo pipefail
          cmake -B build \
            --preset MacOSNinjaRelease \
            -DQt6_DIR="$QT_ROOT_DIR/lib/cmake/Qt6"

      - name: Save vcpkg binary cache after configuration
        if: ${{ steps.vcpkg-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .vcpkg-binary-cache
            vcpkg/downloads
          key: xstudio-vcpkg-macos-arm64-${{ hashFiles('xstudio/vcpkg.json', 'xstudio/cmake/vcpkg_overlay_ports/**', 'xstudio/cmake/vcpkg_triplets/**') }}

      - name: Build and install xSTUDIO
        working-directory: xstudio
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build --target install --parallel "$CMAKE_BUILD_PARALLEL_LEVEL"

      - name: Bundle macOS runtime dependencies
        working-directory: xstudio
        shell: bash
        run: |
          set -euo pipefail
          frameworks=build/xSTUDIO.app/Contents/Frameworks
          vcpkg_lib=build/vcpkg_installed/arm-osx/lib

          test -d "$frameworks"
          test -d "$vcpkg_lib"

          # xSTUDIO's upstream install rules copy project libraries but omit the
          # dynamic vcpkg runtime. Preserve both versioned files and symlinks.
          find "$vcpkg_lib" -maxdepth 1 -name '*.dylib' \
            -exec cp -RP {} "$frameworks/" \;

          # Run deployment only after every install rule has populated the app.
          "$QT_ROOT_DIR/bin/macdeployqt" build/xSTUDIO.app \
            -qmldir=ui \
            -always-overwrite \
            -verbose=3

          # Remove build-machine search paths and give every component a route
          # to the app's private Frameworks directory.
          while IFS= read -r -d '' candidate; do
            file -b "$candidate" | grep -q '^Mach-O' || continue

            while IFS= read -r rpath; do
              case "$rpath" in
                "$RUNNER_WORKSPACE"/*)
                  install_name_tool -delete_rpath "$rpath" "$candidate"
                  ;;
              esac
            done < <(
              otool -l "$candidate" |
                awk '/cmd LC_RPATH/{found=1; next} found && /path /{print $2; found=0}'
            )

            if ! otool -l "$candidate" |
              awk '/cmd LC_RPATH/{found=1; next} found && /path /{print $2; found=0}' |
              grep -Fxq '@executable_path/../Frameworks'; then
              install_name_tool -add_rpath \
                '@executable_path/../Frameworks' "$candidate"
            fi
          done < <(
            find build/xSTUDIO.app/Contents -type f \
              \( -perm -111 -o -name '*.dylib' -o -name '*.so' \) -print0
          )

          test -e "$frameworks/libspdlog.1.17.0.dylib"
          test -e "$frameworks/QtCore.framework/Versions/A/QtCore"

      - name: Verify Apple Silicon application
        working-directory: xstudio
        shell: bash
        run: |
          set -euo pipefail
          test -d build/xSTUDIO.app
          test -x build/xSTUDIO.app/Contents/MacOS/xstudio.bin

          app_arch=$(file build/xSTUDIO.app/Contents/MacOS/xstudio.bin)
          echo "$app_arch"
          grep -q "arm64" <<<"$app_arch"

          missing_count=0
          macho_count=0
          while IFS= read -r -d '' candidate; do
            file -b "$candidate" | grep -q '^Mach-O' || continue
            macho_count=$((macho_count + 1))

            if { otool -l "$candidate"; otool -L "$candidate"; } |
              grep -F "$RUNNER_WORKSPACE"; then
              echo "Runner path remains in $candidate" >&2
              missing_count=$((missing_count + 1))
            fi

            install_id=$(
              otool -D "$candidate" 2>/dev/null |
                awk 'NR == 2 {print; exit}' || true
            )
            while IFS= read -r dependency; do
              [[ "$dependency" == "$install_id" ]] && continue
              relative_path=${dependency#@rpath/}
              if [[ ! -e "build/xSTUDIO.app/Contents/Frameworks/$relative_path" ]]; then
                echo "Missing $dependency required by $candidate" >&2
                missing_count=$((missing_count + 1))
              fi
            done < <(otool -L "$candidate" | awk '$1 ~ /^@rpath\// {print $1}')
          done < <(
            find build/xSTUDIO.app/Contents -type f \
              \( -perm -111 -o -name '*.dylib' -o -name '*.so' \) -print0
          )

          test "$macho_count" -gt 0
          test "$missing_count" -eq 0

          version=$(sed -nE 's/^set\(XSTUDIO_GLOBAL_VERSION "([^"]+)".*/\1/p' CMakeLists.txt)
          test -n "$version"
          short_sha=${GITHUB_SHA:0:8}

          plutil -replace CFBundleIdentifier \
            -string org.aswf.xstudio.community \
            build/xSTUDIO.app/Contents/Info.plist
          plutil -replace CFBundleShortVersionString \
            -string "$version" \
            build/xSTUDIO.app/Contents/Info.plist
          plutil -replace CFBundleVersion \
            -string "$short_sha" \
            build/xSTUDIO.app/Contents/Info.plist

          echo "XSTUDIO_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${version}-macos-arm64-${short_sha}" >> "$GITHUB_ENV"
          echo "DMG_NAME=xSTUDIO-${version}-${short_sha}-macOS-arm64.dmg" >> "$GITHUB_ENV"

      - name: Ad-hoc sign Mach-O components
        working-directory: xstudio
        shell: bash
        run: |
          set -euo pipefail

          # xSTUDIO currently stores QML data below Contents/PlugIns. codesign
          # interprets versioned QML directories there as malformed bundles, so
          # sign each Mach-O outside the app and then put it back in place.
          signing_dir=$(mktemp -d "$RUNNER_TEMP/xstudio-sign.XXXXXX")
          trap 'rm -rf -- "$signing_dir"' EXIT
          signed_count=0

          while IFS= read -r -d '' candidate; do
            if file -b "$candidate" | grep -q '^Mach-O'; then
              staged="$signing_dir/component"
              cp -p "$candidate" "$staged"
              codesign --force --sign - "$staged"
              codesign --verify --strict --verbose=2 "$staged"
              mv -f "$staged" "$candidate"
              signed_count=$((signed_count + 1))
            fi
          done < <(
            find build/xSTUDIO.app/Contents -type f \
              \( -perm -111 -o -name '*.dylib' -o -name '*.so' \) -print0
          )

          test "$signed_count" -gt 0
          echo "Ad-hoc signed $signed_count Mach-O components"
          codesign --display --verbose=2 build/xSTUDIO.app/Contents/MacOS/xstudio.bin

      - name: Create and verify DMG
        working-directory: xstudio
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dmg-root dist
          ditto build/xSTUDIO.app dmg-root/xSTUDIO.app
          ln -s /Applications dmg-root/Applications

          hdiutil create \
            -volname "xSTUDIO ${XSTUDIO_VERSION} ARM64" \
            -srcfolder dmg-root \
            -format UDZO \
            -ov \
            "dist/$DMG_NAME"

          hdiutil verify "dist/$DMG_NAME"
          (
            cd dist
            shasum -a 256 "$DMG_NAME" > "$DMG_NAME.sha256"
          )
          ls -lh dist

      - name: Publish GitHub Release
        working-directory: xstudio
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="xSTUDIO ${XSTUDIO_VERSION} for macOS Apple Silicon (arm64)"
          notes=$(cat <<EOF
          Community build of ASWF xSTUDIO for Apple Silicon Macs.

          - Native arm64 build for M1, M2, M3, M4, and M5 Macs
          - Mach-O components are ad-hoc signed; the app is not notarized by Apple
          - Built automatically from commit ${GITHUB_SHA}
          - DMG and SHA-256 checksum are attached below

          Installation: open the DMG and copy xSTUDIO.app to /Applications. On the first launch, macOS verification may take several minutes.
          EOF
          )

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes"
          fi

          asset_count=$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets | length')
          test "$asset_count" -eq 2

      - name: Clean workflow artifacts
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq '.artifacts[].id' |
          while read -r artifact_id; do
            test -n "$artifact_id" || continue
            gh api --method DELETE \
              "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"
          done
